<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM Clientes - ORM Cristales</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <link rel="stylesheet" href="admin-style.css">

    <style>
        .page-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        .sidebar-list {
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .client-item {
            padding: 1.25rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .client-item:hover {
            background: rgba(14, 165, 233, 0.05);
        }

        .client-item.active {
            border-color: var(--color-primary);
            background: white;
        }

        .detail-view {
            min-height: 70vh;
        }

        .log-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .log-signature {
            width: 80px;
            height: 40px;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 4px;
        }

        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-billed {
            background: #dcfce7;
            color: #166534;
        }

        @media (max-width: 1024px) {
            .page-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="dashboard-navbar">
        <div class="brand">ORM<span>Cristales</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div
                style="display:flex;align-items:center;gap:0.4rem;background:rgba(14,165,233,0.1);padding:0.3rem 0.8rem;border-radius:999px;">
                <i data-lucide="user" style="color:#0ea5e9;width:16px;"></i>
                <span id="nav-user" style="font-weight:600;font-size:0.8rem;color:#0ea5e9;">Admin</span>
            </div>
            <a href="contacts.html" class="tab">Solicitudes</a>
            <button onclick="logout()" class="btn-danger" style="padding: 0.4rem 0.8rem;">Salir</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>Gestión de Clientes Recurrentes</h1>
                <p>Ingeniería de Clientes y Facturación</p>
            </div>
            <button onclick="openModal('modal-add-client')" class="btn-primary" style="width: auto;">
                <i data-lucide="plus"></i> Nuevo Cliente
            </button>
        </div>

        <div class="page-layout">
            <!-- Sidebar: Lista de Clientes -->
            <div class="sidebar">
                <h3 style="margin-bottom: 1rem;">Clientes</h3>
                <div id="loading-clients" class="empty-state"><i data-lucide="loader" class="spin"></i></div>
                <div id="clients-list" class="sidebar-list"></div>
            </div>

            <!-- Detail: Visualización del Cliente Seleccionado -->
            <div id="client-detail" class="detail-view glass-card" style="padding: 2.5rem;">
                <div id="no-selection" class="empty-state" style="padding-top: 5rem;">
                    <i data-lucide="mouse-pointer-2" style="width: 48px; height: 48px;"></i>
                    <h3>Selecciona un cliente</h3>
                    <p>Para ver su historial de servicios y generar facturación.</p>
                </div>

                <div id="detail-content" class="hidden">
                    <div
                        style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                        <div>
                            <h2 id="det-company" style="font-size: 2rem;"></h2>
                            <p id="det-nif" style="color: var(--color-primary); font-weight: 700;"></p>
                            <p id="det-address" style="color: #64748b;"></p>
                        </div>
                        <div style="text-align: right;">
                            <span id="det-frequency" class="status-pill"
                                style="background: #e0f2fe; color: #0369a1; font-size: 0.9rem;"></span>
                            <p id="det-price" style="font-size: 1.5rem; font-weight: 800; margin-top: 0.5rem;"></p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <button onclick="openSignatureModal()" class="btn-primary" style="background: #10b981;">
                            <i data-lucide="pen-tool"></i> Registrar Nueva Limpieza
                        </button>
                        <button id="btn-generate-invoice" onclick="generateInvoice()" class="btn-primary"
                            style="background: #0f172a;">
                            <i data-lucide="file-text"></i> Generar Factura Mensual
                        </button>
                    </div>

                    <h3>Historial de Verificaciones</h3>
                    <div id="service-logs" style="margin-top: 1rem; border-top: 1px solid #e2e8f0;">
                        <!-- Logs here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: AÑADIR CLIENTE -->
    <div id="modal-add-client" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="closeModal('modal-add-client')"><i data-lucide="x"></i></button>
            <h2 style="margin-bottom: 1.5rem;">Registrar Cliente</h2>
            <form id="add-client-form">
                <div class="form-group"><label>Nombre Empresa / Particular</label><input type="text" id="companyName"
                        required></div>
                <div class="form-grid">
                    <div class="form-group"><label>NIF / CIF</label><input type="text" id="nif" required></div>
                    <div class="form-group"><label>Encargado</label><input type="text" id="encargado"></div>
                </div>
                <div class="form-group"><label>Dirección</label><input type="text" id="address" required></div>
                <div class="form-grid">
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="tel" id="phone" required></div>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label>Servicio</label><select id="serviceType">
                            <option value="hogar">Hogar</option>
                            <option value="oficina">Oficina</option>
                            <option value="restaurante">Restaurante</option>
                            <option value="tienda">Tienda</option>
                        </select></div>
                    <div class="form-group"><label>Frecuencia</label><select id="frequency">
                            <option value="semanal">Semanal</option>
                            <option value="quincenal">Quincenal</option>
                            <option value="mensual">Mensual</option>
                        </select></div>
                </div>
                <div class="form-group"><label>Precio Base (€)</label><input type="number" id="basePrice" step="0.01"
                        required></div>
                <button type="submit" class="btn-primary">Guardar Cliente</button>
            </form>
        </div>
    </div>

    <!-- MODAL: FIRMA TÁCTIL -->
    <div id="modal-signature" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="closeModal('modal-signature')"><i data-lucide="x"></i></button>
            <h2>Verificación de Limpieza</h2>
            <p id="sig-client-name" style="margin-bottom: 1rem; color: var(--color-primary); font-weight: 600;"></p>

            <div class="form-group">
                <label>Nombre de quien verifica</label>
                <input type="text" id="verifiedBy" required placeholder="Nombre del cliente/encargado">
            </div>

            <label>Firma del Cliente</label>
            <div class="signature-wrapper">
                <canvas id="signature-pad"></canvas>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="button" onclick="signaturePad.clear()" class="btn-danger" style="flex: 1;">Borrar
                    Firma</button>
                <button type="button" onclick="saveServiceLog()" class="btn-primary"
                    style="flex: 2; background: #10b981;">Guardar y Verificar</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://serverormcristales.onrender.com';
        let signaturePad, clients = [], selectedClient = null;

        function logout() { localStorage.removeItem('token'); window.location.href = 'index.html'; }
        
        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            lucide.createIcons();
            if(id === 'modal-signature') initSignature();
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function initSignature() {
            const canvas = document.getElementById('signature-pad');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad = new SignaturePad(canvas);
        }

        async function fetchClients() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API}/clients`, { headers: { 'Authorization': token }});
                clients = await res.json();
                renderClients();
            } catch (e) { console.error(e); }
            document.getElementById('loading-clients').classList.add('hidden');
        }

        function renderClients() {
            const list = document.getElementById('clients-list');
            list.innerHTML = '';
            clients.forEach(c => {
                const div = document.createElement('div');
                div.className = `glass-card client-item ${selectedClient && selectedClient._id === c._id ? 'active' : ''}`;
                div.innerHTML = `<strong>${c.companyName}</strong><br><small style="color:#64748b">${c.address}</small>`;
                div.onclick = () => selectClient(c);
                list.appendChild(div);
            });
        }

        async function selectClient(client) {
            selectedClient = client;
            renderClients();
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('detail-content').classList.remove('hidden');
            
            document.getElementById('det-company').textContent = client.companyName;
            document.getElementById('det-nif').textContent = `NIF: ${client.nif}`;
            document.getElementById('det-address').textContent = client.address;
            document.getElementById('det-frequency').textContent = client.frequency.toUpperCase();
            document.getElementById('det-price').textContent = `${(client.basePrice * 1.21).toFixed(2)}€ (IVA inc.)`;
            
            fetchLogs(client._id);
        }

        async function fetchLogs(clientId) {
            const token = localStorage.getItem('token');
            const logContainer = document.getElementById('service-logs');
            logContainer.innerHTML = '<p class="empty-state">Cargando historial...</p>';
            
            try {
                const res = await fetch(`${API}/services/logs/${clientId}`, { headers: { 'Authorization': token }});
                const logs = await res.json();
                logContainer.innerHTML = logs.length ? '' : '<p class="empty-state">Sin servicios registrados.</p>';
                
                logs.forEach(l => {
                    const date = new Date(l.date).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    const row = document.createElement('div');
                    row.className = 'log-entry';
                    row.innerHTML = `
                        <div>
                            <span style="font-weight:600">${date}</span><br>
                            <small>${l.verifiedBy || 'Verificado'}</small>
                        </div>
                        <img src="${l.signature}" class="log-signature">
                        <span class="status-pill status-pending">Pendiente Factura</span>
                    `;
                    logContainer.appendChild(row);
                });
            } catch (e) { logContainer.innerHTML = 'Error al cargar logs.'; }
        }

        function openSignatureModal() {
            if(!selectedClient) return;
            document.getElementById('sig-client-name').textContent = selectedClient.companyName;
            openModal('modal-signature');
        }

        async function saveServiceLog() {
            if(signaturePad.isEmpty()) return alert('El cliente debe firmar.');
            const verifiedBy = document.getElementById('verifiedBy').value;
            if(!verifiedBy) return alert('Indica quién verifica.');

            const token = localStorage.getItem('token');
            const res = await fetch(`${API}/services/log`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ clientId: selectedClient._id, signature: signaturePad.toDataURL(), verifiedBy })
            });

            if(res.ok) {
                closeModal('modal-signature');
                document.getElementById('verifiedBy').value = '';
                selectClient(selectedClient);
            }
        }

        // Formulario añadir cliente
        document.getElementById('add-client-form').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const data = {
                companyName: document.getElementById('companyName').value,
                nif: document.getElementById('nif').value,
                encargado: document.getElementById('encargado').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                serviceType: document.getElementById('serviceType').value,
                frequency: document.getElementById('frequency').value,
                basePrice: parseFloat(document.getElementById('basePrice').value)
            };
            const res = await fetch(`${API}/clients`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                closeModal('modal-add-client');
                fetchClients();
            }
        };

        function generateInvoice() {
            const cleaningCount = document.getElementById('service-logs').children.length;
            alert(`SISTEMA PROFESIONAL: Generando factura para ${selectedClient.companyName}.\nServicios realizados: ${cleaningCount}\nTotal Base: ${(selectedClient.basePrice * cleaningCount).toFixed(2)}€\n\nArchivo PDF preparado para descarga.`);
        }

        if(!localStorage.getItem('token')) window.location.href = 'index.html';
        else fetchClients();
    </script>
</body>

</html>
