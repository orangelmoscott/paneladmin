<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso Administrador - ORM Cristales</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">

  <!-- Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="admin-style.css">
</head>

<body>

  <div class="login-container">
    <div class="login-box glass-card">
      <div class="login-header">
        <span class="brand">ORM<span>Cristales</span></span>
        <p>Panel de Administración</p>
      </div>

      <div id="alert-box" class="alert alert-error hidden">Error al iniciar sesión</div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Tu contraseña de acceso" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary" id="submit-btn" style="margin-top: 1rem;">
          Ingresar al Panel <i data-lucide="log-in" class="icon-sm"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const alertBox = document.getElementById('alert-box');

      // Loading state
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Verificando... <i data-lucide="loader" class="icon-sm spin"></i>';
      submitBtn.disabled = true;
      lucide.createIcons();
      alertBox.classList.add('hidden');

      try {
        const response = await fetch('https://serverormcristales.onrender.com/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok && data.token) {
          localStorage.setItem('token', data.token); // Guarda el token en localStorage
          window.location.href = 'contacts.html'; // Redirige a la página de contactos
        } else {
          alertBox.textContent = data.message || 'Credenciales incorrectas';
          alertBox.classList.remove('hidden');
        }
      } catch (error) {
        alertBox.textContent = 'Error de conexión con el servidor. Intenta de nuevo.';
        alertBox.classList.remove('hidden');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        lucide.createIcons();
      }
    });

    // Validar si ya hay token, redirigir automático si es válido
    if (localStorage.getItem('token')) {
      window.location.href = 'contacts.html';
    }
  </script>
</body>

</html>
