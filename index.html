<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso - ORM Cristales</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="admin-style.css">
</head>

<body>

  <div class="login-container">
    <div class="login-box glass-card">
      <div class="login-header">
        <span class="brand">ORM<span>Cristales</span></span>
        <p>Panel de Administración</p>
      </div>

      <!-- Alert box -->
      <div id="alert-box" class="alert alert-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Tu contraseña de acceso" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="submit-btn" style="margin-top: 1rem;">
          Ingresar <i data-lucide="log-in" class="icon-sm"></i>
        </button>
      </form>

      <p id="setup-hint" style="text-align:center; margin-top:1.5rem; font-size:0.85rem; color:#94a3b8; display:none;">
        ¿Primera vez? <a href="setup.html" style="color:#0ea5e9; font-weight:600;">Crear cuenta inicial →</a>
      </p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const params = new URLSearchParams(window.location.search);
    const alertBox = document.getElementById('alert-box');

    if (params.get('session') === 'expired') {
      alertBox.textContent = '⏱ Tu sesión ha expirado. Inicia sesión de nuevo.';
      alertBox.style.display = 'block';
    } else if (params.get('error') === 'conexion') {
      alertBox.textContent = '⚠️ El servidor tardó en responder. Intenta de nuevo.';
      alertBox.style.display = 'block';
    }

    let failCount = parseInt(sessionStorage.getItem('loginFails') || '0');
    if (failCount >= 2) {
      document.getElementById('setup-hint').style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');

      const originalHTML = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Verificando... <i data-lucide="loader" class="icon-sm spin"></i>';
      submitBtn.disabled = true;
      alertBox.style.display = 'none';
      lucide.createIcons();

      try {
        const response = await fetch('https://serverormcristales.onrender.com/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await response.json();
        if (response.ok && data.token) {
          sessionStorage.setItem('loginFails', '0');
          localStorage.setItem('token', data.token);
          localStorage.setItem('adminUser', data.username);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('userFullName', data.fullName || data.username);
          localStorage.setItem('userId', data.userId);

          // Redirigir según rol
          if (data.role === 'cristalero') {
            window.location.href = 'mi-ruta.html';
          } else {
            window.location.href = 'contacts.html';
          }
        } else {
          failCount++;
          sessionStorage.setItem('loginFails', failCount.toString());
          alertBox.textContent = data.message || 'Usuario o contraseña incorrectos';
          alertBox.style.display = 'block';
          if (failCount >= 2) {
            document.getElementById('setup-hint').style.display = 'block';
          }
        }
      } catch (error) {
        alertBox.textContent = '⚠️ El servidor tardó en responder (puede estar iniciando). Espera 30s e intenta de nuevo.';
        alertBox.style.display = 'block';
      } finally {
        submitBtn.innerHTML = originalHTML;
        submitBtn.disabled = false;
        lucide.createIcons();
      }
    });

    // Redirigir si ya hay token válido
    if (localStorage.getItem('token')) {
      const role = localStorage.getItem('userRole');
      if (!role) {
        // Sesión antigua sin rol, forzar relogin
        localStorage.clear();
      } else if (role === 'cristalero') {
        window.location.href = 'mi-ruta.html';
      } else {
        window.location.href = 'contacts.html';
      }
    }
  </script>
</body>

</html>
