<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitudes - ORM Cristales</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="admin-style.css">
  <style>
    .status-select {
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.2s;
    }

    .status-pendiente {
      background: #fef3c7;
      color: #92400e;
    }

    .status-contactado {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-presupuesto_enviado {
      background: #dcfce7;
      color: #166534;
    }
  </style>
</head>

<body>

  <nav class="dashboard-navbar">
    <div class="brand">ORM<span>Cristales</span></div>
    <div class="nav-links">
      <div
        style="display:flex;align-items:center;gap:0.4rem;background:rgba(14,165,233,0.1);padding:0.3rem 0.8rem;border-radius:999px;">
        <i data-lucide="user" style="color:#0ea5e9;width:16px;"></i>
        <span id="nav-user" style="font-weight:600;font-size:0.8rem;color:#0ea5e9;">Admin</span>
      </div>
      <a href="clients.html" class="nav-link">
        <i data-lucide="briefcase"></i> Clientes
      </a>
      <a href="users.html" class="nav-link">
        <i data-lucide="users"></i> Equipo
      </a>
      <button onclick="logout()" class="btn-danger">
        <i data-lucide="log-out"></i> Salir
      </button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <div>
        <h1>Solicitudes de Presupuesto</h1>
        <p style="color: #64748b;">Gestiona los mensajes de clientes potenciales.</p>
      </div>
      <button onclick="fetchContacts()" class="btn-primary"><i data-lucide="refresh-cw"></i> Actualizar</button>
    </div>

    <div class="glass-card">
      <div class="table-wrapper">
        <table class="custom-table" id="contacts-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Contacto</th>
              <th>Mensaje</th>
              <th>Estado</th>
              <th style="text-align: right;">Acciones</th>
            </tr>
          </thead>
          <tbody id="contacts-body">
            <tr>
              <td colspan="5" style="text-align:center;">Cargando solicitudes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://serverormcristales.onrender.com';
    lucide.createIcons();

    function logout() { localStorage.removeItem('token'); window.location.href = 'index.html'; }
    document.getElementById('nav-user').textContent = localStorage.getItem('adminUser') || 'Admin';

    async function fetchContacts() {
      const token = localStorage.getItem('token');
      const tbody = document.getElementById('contacts-body');
      try {
        const res = await fetch(`${API}/contacts`, { headers: { 'Authorization': token } });
        const contacts = await res.json();
        tbody.innerHTML = contacts.length ? '' : '<tr><td colspan="5" style="text-align:center;">No hay solicitudes pendientes.</td></tr>';

        contacts.forEach(c => {
          const tr = document.createElement('tr');
          const statusClass = `status-${c.status || 'pendiente'}`;
          tr.innerHTML = `
                        <td data-label="Cliente">
                            <div style="display:flex; align-items:center; gap:0.5rem">
                                <i data-lucide="user" class="icon-sm" style="color:#94a3b8"></i>
                                <strong>${c.name || 'Anónimo'}</strong>
                            </div>
                        </td>
                        <td data-label="Contacto">
                            <a href="tel:${c.telefono}" style="color:var(--color-primary); display:block;"><i data-lucide="phone" class="icon-sm"></i> ${c.telefono}</a>
                            <small style="color:#64748b">${c.email}</small>
                        </td>
                        <td data-label="Mensaje" style="max-width:300px; font-size:0.85rem; color:#475569;">${c.message || '—'}</td>
                        <td data-label="Estado">
                            <select onchange="updateStatus('${c._id}', this.value)" class="status-select ${statusClass}">
                                <option value="pendiente" ${c.status === 'pendiente' ? 'selected' : ''}>🟡 Pendiente</option>
                                <option value="contactado" ${c.status === 'contactado' ? 'selected' : ''}>🔵 Contactado</option>
                                <option value="presupuesto_enviado" ${c.status === 'presupuesto_enviado' ? 'selected' : ''}>🟢 Enviado</option>
                            </select>
                        </td>
                        <td data-label="Acciones" style="text-align: right;">
                            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                                <a href="mailto:${c.email}" class="btn-email"><i data-lucide="mail"></i></a>
                                <button onclick="deleteContact('${c._id}')" class="btn-delete"><i data-lucide="trash-2"></i></button>
                            </div>
                        </td>
                    `;
          tbody.appendChild(tr);
        });
      } catch (e) { tbody.innerHTML = '<tr><td colspan="5">Error al cargar.</td></tr>'; }
      lucide.createIcons();
    }

    async function updateStatus(id, status) {
      const token = localStorage.getItem('token');
      await fetch(`${API}/contacts/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': token },
        body: JSON.stringify({ status })
      });
      fetchContacts();
    }

    async function deleteContact(id) {
      if (!confirm('¿Eliminar registro?')) return;
      await fetch(`${API}/contacts/${id}`, { method: 'DELETE', headers: { 'Authorization': localStorage.getItem('token') } });
      fetchContacts();
    }

    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    else fetchContacts();
  </script>
</body>

</html>
