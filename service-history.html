<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial Maestro - ORM Cristales</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin-style.css">

    <style>
        .service-log-card {
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            transition: var(--transition);
        }

        .service-log-card:hover {
            transform: translateY(-3px);
        }

        .signature-preview {
            width: 120px;
            height: 60px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            object-fit: contain;
        }

        .log-date {
            font-weight: 700;
            color: var(--color-secondary);
            font-size: 1.1rem;
        }

        .log-client {
            color: var(--color-primary);
            font-weight: 700;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .service-log-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .signature-preview {
                width: 100%;
                height: 100px;
            }
        }
    </style>
</head>

<body>

    <nav class="dashboard-navbar">
        <div class="brand">ORM<span>Cristales</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="clients.html" class="tab"><i data-lucide="arrow-left"
                    style="width:14px; display:inline; vertical-align:middle;"></i> Volver</a>
            <button onclick="logout()" class="btn-danger">Salir</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>Historial General de Limpiezas</h1>
                <p style="color: #64748b;">Auditoría completa de servicios verificados.</p>
            </div>
            <button onclick="exportToCSV()" class="btn-primary" style="background: #475569;">
                <i data-lucide="download"></i> Reporte Excel
            </button>
        </div>

        <div id="loading-state" class="empty-state">
            <i data-lucide="loader" class="spin"></i>
            <h3>Sincronizando registros...</h3>
        </div>

        <div id="logs-container"></div>
    </div>

    <script>
        const API = 'https://serverormcristales.onrender.com';
        lucide.createIcons();

        function logout() { localStorage.removeItem('token'); window.location.href = 'index.html'; }

        async function fetchAllLogs() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('logs-container');
            const loading = document.getElementById('loading-state');

            try {
                const clientsRes = await fetch(`${API}/clients`, { headers: { 'Authorization': token } });
                const clientsList = await clientsRes.json();

                let allLogs = [];
                for (let client of clientsList) {
                    const res = await fetch(`${API}/services/logs/${client._id}`, { headers: { 'Authorization': token } });
                    const logs = await res.json();
                    logs.forEach(l => l.clientData = client);
                    allLogs = allLogs.concat(logs);
                }

                allLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
                loading.classList.add('hidden');

                if (allLogs.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>Sin registros</h3></div>';
                    return;
                }

                allLogs.forEach(log => {
                    const date = new Date(log.date).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const div = document.createElement('div');
                    div.className = 'glass-card service-log-card';
                    div.innerHTML = `
                        <div style="flex: 1.5;">
                            <p class="log-client">${log.clientData.companyName}</p>
                            <p class="log-date">${date}</p>
                            <small style="color: #64748b;">${log.clientData.address}</small>
                        </div>
                        <div style="flex: 1; text-align: center;">
                            <p style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">Firmado Por</p>
                            <p style="font-weight:600;">${log.verifiedBy || 'N/A'}</p>
                        </div>
                        <div style="flex: 1; text-align: right;">
                            <img src="${log.signature}" class="signature-preview" alt="Firma">
                        </div>
                        <div style="margin-left: 1rem;">
                            <button onclick="notifyPayment('${log.clientData.email}', '${log.clientData.companyName}', '${log.totalPrice.toFixed(2)}')" class="btn-primary" style="padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px;">
                                <i data-lucide="mail"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                lucide.createIcons();
            } catch (error) { loading.textContent = 'Error al cargar.'; }
        }

        function notifyPayment(email, company, amount) {
            const subject = encodeURIComponent(`Servicio Completado - ORM Cristales`);
            const body = encodeURIComponent(`Hola ${company},\n\nEl servicio de limpieza ha sido completado con éxito.\nImporte: ${amount}€ (IVA Inc).\n\nSaludos.`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        function exportToCSV() { alert('Generando reporte consolidado...'); }

        if (!localStorage.getItem('token')) window.location.href = 'index.html';
        else fetchAllLogs();
    </script>
</body>

</html>
