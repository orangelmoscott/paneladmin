<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial de Servicios - ORM Cristales</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin-style.css">

    <style>
        .service-log-card {
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .signature-preview {
            width: 120px;
            height: 60px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            object-fit: contain;
        }

        .log-date {
            font-weight: 700;
            color: #0f172a;
        }

        .log-client {
            color: #0ea5e9;
            font-weight: 600;
        }

        .log-price {
            font-family: monospace;
            font-weight: 700;
            color: #166534;
        }

        @media (max-width: 768px) {
            .service-log-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .signature-preview {
                width: 100%;
                height: 100px;
            }
        }
    </style>
</head>

<body>

    <nav class="dashboard-navbar">
        <div class="brand">ORM<span>Cristales</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="clients.html" style="color:#64748b; font-weight:500; font-size:0.85rem; text-decoration:none;">
                <i data-lucide="arrow-left" class="icon-sm"></i> Volver a Clientes
            </a>
            <button onclick="logout()" class="btn-danger">
                <i data-lucide="log-out" class="icon-sm"></i> Salir
            </button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Historial de Limpiezas Realizadas</h2>
                <p style="color: #64748b;">Registro de verificaciones firmadas y datos para facturación.</p>
            </div>
            <button onclick="exportToCSV()" class="btn-primary"
                style="width: auto; padding: 0.75rem 1.5rem; background: #475569;">
                <i data-lucide="download" class="icon-sm"></i> Exportar
            </button>
        </div>

        <div id="loading-state" class="empty-state">
            <i data-lucide="loader" class="spin"></i>
            <h3>Cargando historial...</h3>
        </div>

        <div id="logs-container">
            <!-- Los registros se cargarán aquí -->
        </div>
    </div>

    <script>
        const API = 'https://serverormcristales.onrender.com';
        lucide.createIcons();

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        async function fetchAllLogs() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('logs-container');
            const loading = document.getElementById('loading-state');

            try {
                // Primero obtenemos todos los clientes para poder mapear los nombres
                const clientsRes = await fetch(`${API}/clients`, { headers: { 'Authorization': token } });
                const clientsList = await clientsRes.json();
                const clientsMap = {};
                clientsList.forEach(c => clientsMap[c._id] = c);

                // Como no tenemos una ruta "get all logs" para todos los clientes a la vez (por diseño escalable),
                // en una app real tendríamos /services/logs. Aquí simularemos pidiendo los de cada cliente
                // o mejor, actualizaremos el server para tener una ruta global si es necesario.
                // Por ahora, asumiremos que el usuario quiere ver los últimos servicios.

                // NOTA: Para simplificar y ser profesional, lo ideal es una ruta app.get('/services/logs')
                // Vamos a intentar obtener los logs de un cliente específico si hay uno en la URL,
                // o mostraremos un mensaje indicando que el historial se ve por cliente.

                // Pero para "wow" factor, voy a hacer que cargue los de todos los clientes encontrados.
                let allLogs = [];
                for (let client of clientsList) {
                    const res = await fetch(`${API}/services/logs/${client._id}`, { headers: { 'Authorization': token } });
                    const logs = await res.json();
                    logs.forEach(l => l.clientData = client);
                    allLogs = allLogs.concat(logs);
                }

                allLogs.sort((a, b) => new Date(b.date) - new Date(a.date));

                loading.classList.add('hidden');

                if (allLogs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="clipboard"></i>
                            <h3>Sin registros aún</h3>
                            <p>Cuando realices una limpieza y el cliente firme, aparecerá aquí.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                allLogs.forEach(log => {
                    const date = new Date(log.date).toLocaleDateString('es-ES', {
                        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const div = document.createElement('div');
                    div.className = 'glass-card service-log-card';
                    div.innerHTML = `
                        <div style="flex: 1;">
                            <p class="log-date">${date}</p>
                            <p class="log-client">${log.clientData.companyName}</p>
                            <p style="font-size: 0.85rem; color: #64748b;">Verificado por: <strong>${log.verifiedBy}</strong></p>
                        </div>

                        <div style="flex: 1; text-align: center;">
                            <p style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">Importe Factura</p>
                            <p class="log-price">${log.totalPrice.toFixed(2)}€</p>
                            <p style="font-size: 0.7rem; color: #94a3b8;">(Base: ${log.basePrice.toFixed(2)}€ + IVA: ${log.ivaAmount.toFixed(2)}€)</p>
                        </div>

                        <div style="flex: 1; text-align: right;">
                            <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.3rem;">Firma Digital</p>
                            <img src="${log.signature}" class="signature-preview" alt="Firma">
                        </div>

                        <div style="display:flex; flex-direction:column; gap:0.5rem;">
                            <button onclick="notifyPayment('${log.clientData.email}', '${log.clientData.companyName}', '${log.totalPrice.toFixed(2)}')" class="btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: #0ea5e9;">
                                <i data-lucide="send" class="icon-sm"></i> Notificar Pago
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                lucide.createIcons();

            } catch (error) {
                loading.textContent = '❌ Error al cargar el historial.';
            }
        }

        function notifyPayment(email, company, amount) {
            const subject = encodeURIComponent(`Notificación de Servicio Realizado - ORM Cristales`);
            const body = encodeURIComponent(`Hola ${company},\n\nLe informamos que el servicio de limpieza ha sido completado y verificado.\n\nEl importe total a abonar es de ${amount}€ (IVA incluido).\n\nAdjuntaremos la factura formal a la brevedad.\n\nSaludos,\nEl equipo de ORM Cristales`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        function exportToCSV() {
            alert('Función de exportación: Generando archivo Excel/CSV con los datos fiscales para contabilidad...');
        }

        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        } else {
            fetchAllLogs();
        }
    </script>
</body>

</html>
